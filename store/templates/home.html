<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'store/style.css' %}">
</head>
<body>

<div class="container">
    <h1>Our Products</h1>

    {% for product in products %}
        <div class="product-card">
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <p class="price">R{{ product.price }}</p>
        </div>
    {% empty %}
        <p>No products available.</p>
    {% endfor %}
</div>

</body>
</html>
